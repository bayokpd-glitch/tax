name: Render Release Zips

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag that contains one or more zip assets, for example v1"
        required: true
        default: "v1"
      chunk_workers:
        description: "Parallel chunk workers per video"
        required: true
        default: "4"
      videos_parallel:
        description: "How many videos to process at the same time"
        required: true
        default: "5"
      remotion_concurrency:
        description: "Remotion concurrency inside each chunk worker"
        required: true
        default: "2"

permissions:
  contents: write
  actions: write

jobs:
  find-release-zips:
    runs-on: ubuntu-latest
    outputs:
      chunk_matrix: ${{ steps.matrix.outputs.chunk_matrix }}
      video_matrix: ${{ steps.matrix.outputs.video_matrix }}
      chunk_max_parallel: ${{ steps.matrix.outputs.chunk_max_parallel }}
    steps:
      - name: Checkout renderer
        uses: actions/checkout@v4

      - name: Download release zip assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          mkdir -p release-zips
          gh release download "$RELEASE_TAG" --pattern "*.zip" --dir release-zips
          ls -lah release-zips

      - name: Build render matrices
        id: matrix
        env:
          CHUNK_WORKERS: ${{ inputs.chunk_workers }}
          VIDEOS_PARALLEL: ${{ inputs.videos_parallel }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          def positive_int(value, default):
              try:
                  parsed = int(str(value).strip())
                  return parsed if parsed > 0 else default
              except Exception:
                  return default

          chunk_workers = positive_int(os.environ.get('CHUNK_WORKERS'), 4)
          videos_parallel = positive_int(os.environ.get('VIDEOS_PARALLEL'), 5)
          zips = sorted(Path('release-zips').glob('*.zip'))
          if not zips:
              raise SystemExit('No .zip assets found in the release.')

          chunk_rows = []
          video_rows = []
          for zip_path in zips:
              stem = re.sub(r'[^A-Za-z0-9_.-]+', '-', zip_path.stem).strip('-') or 'video'
              video_rows.append({
                  'zip': zip_path.name,
                  'stem': stem,
                  'chunk_count': chunk_workers,
              })
              for chunk_index in range(chunk_workers):
                  chunk_rows.append({
                      'zip': zip_path.name,
                      'stem': stem,
                      'chunk_index': chunk_index,
                      'chunk_number': f'{chunk_index + 1:03d}',
                      'chunk_count': chunk_workers,
                  })

          out = Path(os.environ['GITHUB_OUTPUT'])
          with out.open('a', encoding='utf-8') as fh:
              fh.write('chunk_matrix=' + json.dumps({'include': chunk_rows}, separators=(',', ':')) + '\n')
              fh.write('video_matrix=' + json.dumps({'include': video_rows}, separators=(',', ':')) + '\n')
              fh.write('chunk_max_parallel=' + str(max(1, videos_parallel * chunk_workers)) + '\n')
          print(f'Found {len(zips)} zip(s). Rendering each with {chunk_workers} chunk worker(s).')
          PY

  render-chunks:
    needs: find-release-zips
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.find-release-zips.outputs.chunk_max_parallel) }}
      matrix: ${{ fromJSON(needs.find-release-zips.outputs.chunk_matrix) }}
    steps:
      - name: Checkout renderer
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install renderer dependencies
        run: npm ci

      - name: Download story package
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          mkdir -p package public out
          gh release download "$RELEASE_TAG" --pattern "${{ matrix.zip }}" --dir package
          unzip -q "package/${{ matrix.zip }}" -d public
          find public -maxdepth 2 -type f | sed 's#^#  #'

      - name: Detect renderer and chunk frame range
        id: detect
        env:
          CHUNK_INDEX: ${{ matrix.chunk_index }}
          CHUNK_COUNT: ${{ matrix.chunk_count }}
          REQUESTED_CONCURRENCY: ${{ inputs.remotion_concurrency }}
        run: |
          python3 - <<'PY'
          import json
          import math
          import os
          from pathlib import Path

          def positive_int(value, default):
              try:
                  parsed = int(str(value).strip())
                  return parsed if parsed > 0 else default
              except Exception:
                  return default

          renderers = json.loads(Path('renderers.json').read_text(encoding='utf-8'))
          selected_name = None
          selected = None
          for name, config in renderers.items():
              marker = config.get('marker')
              if marker and (Path('public') / marker).exists():
                  selected_name = name
                  selected = config
                  break
          if not selected:
              markers = ', '.join(sorted(str(c.get('marker')) for c in renderers.values() if c.get('marker')))
              raise SystemExit(f'Could not auto-detect renderer. Expected one of: {markers}')

          marker_path = Path('public') / selected['marker']
          data = json.loads(marker_path.read_text(encoding='utf-8'))
          fps = positive_int(data.get('fps'), 30)
          try:
              duration_seconds = float(data.get('duration') or 0)
          except Exception:
              duration_seconds = 0
          if duration_seconds <= 0:
              scenes = data.get('scenes') or []
              ends = []
              for scene in scenes:
                  try:
                      ends.append(float(scene.get('end') or scene.get('endTime') or 0))
                  except Exception:
                      pass
              duration_seconds = max(ends) if ends else 8

          total_frames = max(30, math.ceil(duration_seconds * fps))
          chunk_count = positive_int(os.environ.get('CHUNK_COUNT'), 1)
          chunk_index = positive_int(int(os.environ.get('CHUNK_INDEX', '0')) + 1, 1) - 1
          chunk_index = min(max(chunk_index, 0), chunk_count - 1)
          start = (total_frames * chunk_index) // chunk_count
          end = (total_frames * (chunk_index + 1)) // chunk_count - 1
          start = min(start, total_frames - 1)
          end = min(max(end, start), total_frames - 1)

          requested = positive_int(os.environ.get('REQUESTED_CONCURRENCY'), 2)
          # GitHub hosted ubuntu runners usually expose 2 CPU cores. Remotion errors if this is higher.
          safe_concurrency = min(requested, os.cpu_count() or requested)

          out = Path(os.environ['GITHUB_OUTPUT'])
          with out.open('a', encoding='utf-8') as fh:
              fh.write(f"renderer={selected_name}\n")
              fh.write(f"composition={selected['composition']}\n")
              fh.write(f"start={start}\n")
              fh.write(f"end={end}\n")
              fh.write(f"fps={fps}\n")
              fh.write(f"total_frames={total_frames}\n")
              fh.write(f"safe_concurrency={safe_concurrency}\n")
          print(f"Detected {selected_name}: {selected['composition']}, {duration_seconds:.2f}s at {fps} FPS.")
          print(f"Rendering chunk {chunk_index + 1}/{chunk_count}: frames {start}-{end} of {total_frames}.")
          PY

      - name: Render video chunk
        run: |
          npx remotion render src/index.ts "${{ steps.detect.outputs.composition }}" "out/${{ matrix.stem }}_chunk_${{ matrix.chunk_number }}.mp4" \
            --frames="${{ steps.detect.outputs.start }}-${{ steps.detect.outputs.end }}" \
            --concurrency="${{ steps.detect.outputs.safe_concurrency }}"

      - name: Upload rendered chunk
        uses: actions/upload-artifact@v4
        with:
          name: rendered-${{ matrix.stem }}-chunk-${{ matrix.chunk_number }}
          path: out/${{ matrix.stem }}_chunk_${{ matrix.chunk_number }}.mp4
          if-no-files-found: error
          retention-days: 1

  combine-videos:
    needs: [find-release-zips, render-chunks]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.videos_parallel) }}
      matrix: ${{ fromJSON(needs.find-release-zips.outputs.video_matrix) }}
    steps:
      - name: Checkout renderer
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download rendered chunks
        uses: actions/download-artifact@v4
        with:
          pattern: rendered-${{ matrix.stem }}-chunk-*
          path: chunks
          merge-multiple: false

      - name: Stitch chunks into final video
        run: |
          mkdir -p out
          python3 - <<'PY'
          from pathlib import Path
          import os

          files = sorted(Path('chunks').glob('**/*.mp4'))
          if not files:
              raise SystemExit('No rendered chunk files were downloaded.')
          expected = int(os.environ.get('EXPECTED_CHUNKS', '0') or 0)
          if expected and len(files) != expected:
              print(f'Warning: expected {expected} chunk(s), found {len(files)} chunk file(s).')
          with Path('chunk-list.txt').open('w', encoding='utf-8') as fh:
              for file in files:
                  fh.write("file '" + str(file.resolve()).replace("'", "'\\''") + "'\n")
          print('Chunks to stitch:')
          for file in files:
              print('  ' + str(file))
          PY
          ffmpeg -y -f concat -safe 0 -i chunk-list.txt -c copy "out/${{ matrix.stem }}.mp4" || \
          ffmpeg -y -f concat -safe 0 -i chunk-list.txt -c:v libx264 -preset veryfast -crf 18 -pix_fmt yuv420p -c:a aac -b:a 192k "out/${{ matrix.stem }}.mp4"
        env:
          EXPECTED_CHUNKS: ${{ matrix.chunk_count }}

      - name: Upload final video to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" "out/${{ matrix.stem }}.mp4" --clobber

      - name: Delete temporary chunk artifacts
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PREFIX: rendered-${{ matrix.stem }}-chunk-
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --paginate --jq '.artifacts[] | select(.name | startswith(env.PREFIX)) | .id' | while read -r artifact_id; do
            if [ -n "$artifact_id" ]; then
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$artifact_id" || true
            fi
          done
